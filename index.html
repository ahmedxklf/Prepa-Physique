<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">

    <link rel="manifest" href="manifest.json">

    <title>Prépa Physique - Élite</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
            --text-muted: #777777;
            --accent-orange: #ff9800;
            --success-green: #2e7d32;
            --fail-red: #c62828;
            --blue-activity: #1565c0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        h1 {
            font-size: 26px;
            margin: 10px 0 5px 0;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .date-sub {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 700;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid #252525;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 5px;
            border-radius: 18px 0 0 18px;
        }

        .card.mandatory::before { background-color: var(--accent-orange); }
        .card.activity::before { background-color: var(--blue-activity); }
        .card.completed::before { background-color: #4caf50; }
        
        .card.completed {
            background-color: #141414;
            border-color: #1c1c1c;
            opacity: 0.5;
        }

        .card-info h3 {
            margin: 0 0 4px 0;
            font-size: 19px;
            font-weight: 700;
        }

        .card-info p {
            margin: 0;
            font-size: 13px;
            color: var(--text-muted);
        }

        .checkbox-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid #333333;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .card.mandatory .checkbox-btn { border-color: var(--accent-orange); }
        .card.activity .checkbox-btn { border-color: var(--blue-activity); }
        .card.completed .checkbox-btn {
            background-color: #4caf50;
            border-color: #4caf50;
        }

        .checkbox-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: white;
            stroke-width: 4;
            display: none;
        }

        .card.completed .checkbox-btn svg { display: block; }

        .calendar-container {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid #252525;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .calendar-header month {
            font-size: 16px;
            font-weight: 700;
            text-transform: capitalize;
        }

        .nav-btn {
            background: #262626;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .weekday-label {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .day-cell {
            background-color: #222;
            border-radius: 10px;
            aspect-ratio: 1 / 1.1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 5px;
            box-sizing: border-box;
            cursor: pointer;
            position: relative;
            border: 1px solid transparent;
        }

        .day-cell.empty {
            background-color: transparent;
            cursor: default;
        }

        .day-num {
            font-size: 13px;
            font-weight: 700;
        }

        .day-workout {
            font-size: 8px;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .day-cell.success { background-color: var(--success-green); }
        .day-cell.success .day-workout { color: #a5d6a7; }
        
        .day-cell.fail { background-color: var(--fail-red); }
        .day-cell.fail .day-workout { color: #ef9a9a; }
        
        .day-cell.repos { background-color: #2d2d2d; }
        .day-cell.repos .day-num { color: #555; }
        .day-cell.repos .day-workout { color: #444; }

        .day-cell.today {
            border-color: var(--accent-orange);
            box-shadow: 0 0 8px rgba(255, 152, 0, 0.4);
        }

        .notif-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-orange), #f4511e);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Ma Prépa Physique</h1>
    <div class="date-sub" id="current-date">Chargement...</div>

    <button class="notif-btn" id="enable-notif">🔔 Activer le Système de Notifications</button>

    <div class="section-title">Objectifs du Jour</div>
    <div id="tasks-container"></div>

    <div class="section-title" style="margin-top: 25px;">Calendrier de Suivi Historique</div>
    <div class="calendar-container">
        <div class="calendar-header">
            <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
            <month id="calendar-month-year"></month>
            <button class="nav-btn" onclick="changeMonth(1)">▶</button>
        </div>
        <div class="calendar-grid" id="calendar-grid-target"></div>
    </div>
</div>

<script>
    const weeklyProgram = {
        1: { mandatory: ["Renfo"], activity: "Activité" },
        2: { mandatory: ["HIIT"], activity: "Activité" },
        3: { mandatory: ["Cardio", "Renfo"], activity: null },
        4: { mandatory: ["HIIT"], activity: "Activité" },
        5: { mandatory: ["Cardio"], activity: "Activité" },
        6: { mandatory: ["Renfo"], activity: null },
        0: { mandatory: [], activity: null }
    };

    const dayNames = ["Dim", "Lun", "Mar", "Mer", "Jeu", "Ven", "Sam"];
    const monthNames = ["janvier", "février", "mars", "avril", "mai", "juin", "juillet", "août", "septembre", "octobre", "novembre", "décembre"];
    
    const today = new Date();
    let currentViewYear = today.getFullYear();
    let currentViewMonth = today.getMonth();

    function getLocalKey(dateInstance) {
        const y = dateInstance.getFullYear();
        const m = String(dateInstance.getMonth() + 1).padStart(2, '0');
        const d = String(dateInstance.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    document.getElementById('current-date').innerText = today.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    const todayKey = getLocalKey(today);
    let trackingData = JSON.parse(localStorage.getItem('prepa_tracking')) || {};
    
    if (!trackingData[todayKey]) {
        trackingData[todayKey] = { completed: [] };
    }

    const todayProg = weeklyProgram[today.getDay()];
    const tasksContainer = document.getElementById('tasks-container');

    if (todayProg.mandatory.length === 0 && !todayProg.activity) {
        tasksContainer.innerHTML = `<div class="card" style="border-left-color: #333"><div class="card-info"><h3>Repos aujourd'hui</h3><p>Relâche la pression et récupère !</p></div></div>`;
    } else {
        todayProg.mandatory.forEach(type => {
            const isDone = trackingData[todayKey].completed.includes(type);
            const card = document.createElement('div');
            card.className = `card mandatory ${isDone ? 'completed' : ''}`;
            card.innerHTML = `
                <div class="card-info">
                    <h3>${type}</h3>
                    <p>Séance obligatoire du jour</p>
                </div>
                <button class="checkbox-btn" onclick="toggleTask('${type}', this)">
                    <svg viewBox="0 0 24 24"><path d="M4 12l5 5L20 6" stroke="white" fill="none"/></svg>
                </button>
            `;
            tasksContainer.appendChild(card);
        });

        if (todayProg.activity) {
            const isActivityDone = trackingData[todayKey].activityDone || false;
            const card = document.createElement('div');
            card.className = `card activity ${isActivityDone ? 'completed' : ''}`;
            card.innerHTML = `
                <div class="card-info">
                    <h3>${todayProg.activity} libre</h3>
                    <p>Optionnel (Foot entre amis, etc.)</p>
                </div>
                <button class="checkbox-btn" onclick="toggleActivity(this)">
                    <svg viewBox="0 0 24 24"><path d="M4 12l5 5L20 6" stroke="white" fill="none"/></svg>
                </button>
            `;
            tasksContainer.appendChild(card);
        }
    }

    window.toggleTask = function(type, btn) {
        const card = btn.parentElement;
        card.classList.toggle('completed');
        
        if (card.classList.contains('completed')) {
            if (!trackingData[todayKey].completed.includes(type)) trackingData[todayKey].completed.push(type);
        } else {
            trackingData[todayKey].completed = trackingData[todayKey].completed.filter(t => t !== type);
        }
        
        if (trackingData[todayKey].completed.length === todayProg.mandatory.length) {
            trackingData[todayKey].status = "success";
        } else {
            delete trackingData[todayKey].status;
        }
        
        localStorage.setItem('prepa_tracking', JSON.stringify(trackingData));
        buildCalendarGrid();
        syncReminders();
    };

    window.toggleActivity = function(btn) {
        const card = btn.parentElement;
        card.classList.toggle('completed');
        trackingData[todayKey].activityDone = card.classList.contains('completed');
        localStorage.setItem('prepa_tracking', JSON.stringify(trackingData));
    };

    window.changeMonth = function(direction) {
        currentViewMonth += direction;
        if (currentViewMonth > 11) {
            currentViewMonth = 0;
            currentViewYear++;
        } else if (currentViewMonth < 0) {
            currentViewMonth = 11;
            currentViewYear--;
        }
        buildCalendarGrid();
    };

    function buildCalendarGrid() {
        const gridTarget = document.getElementById('calendar-grid-target');
        document.getElementById('calendar-month-year').innerText = `${monthNames[currentViewMonth]} ${currentViewYear}`;
        gridTarget.innerHTML = "";

        const customDayOrder = [1, 2, 3, 4, 5, 6, 0];
        customDayOrder.forEach(dNum => {
            const lbl = document.createElement('div');
            lbl.className = 'weekday-label';
            lbl.innerText = dayNames[dNum];
            gridTarget.appendChild(lbl);
        });

        const firstDayInstance = new Date(currentViewYear, currentViewMonth, 1);
        let firstDayIndex = firstDayInstance.getDay() - 1; 
        if (firstDayIndex === -1) firstDayIndex = 6;

        const totalDaysInMonth = new Date(currentViewYear, currentViewMonth + 1, 0).getDate();

        for (let i = 0; i < firstDayIndex; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'day-cell empty';
            gridTarget.appendChild(emptyCell);
        }

        const midnightToday = new Date(today.getFullYear(), today.getMonth(), today.getDate());

        for (let day = 1; day <= totalDaysInMonth; day++) {
            const currentLoopDate = new Date(currentViewYear, currentViewMonth, day);
            const loopKey = getLocalKey(currentLoopDate);
            const dayOfWeek = currentLoopDate.getDay();
            
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            
            const numDiv = document.createElement('div');
            numDiv.className = 'day-num';
            numDiv.innerText = day;
            cell.appendChild(numDiv);

            const dayProg = weeklyProgram[dayOfWeek];
            const hasWorkout = dayProg.mandatory.length > 0;
            
            const workoutDiv = document.createElement('div');
            workoutDiv.className = 'day-workout';
            workoutDiv.innerText = hasWorkout ? dayProg.mandatory.join('+') : "Repos";
            cell.appendChild(workoutDiv);

            if (loopKey === todayKey) {
                cell.classList.add('today');
            }

            if (!hasWorkout) {
                cell.classList.add('repos');
            } else if (trackingData[loopKey]) {
                if (trackingData[loopKey].status === "success") cell.classList.add('success');
                else if (trackingData[loopKey].status === "fail") cell.classList.add('fail');
            } else if (currentLoopDate < midnightToday) {
                cell.classList.add('fail');
            }

            if (hasWorkout) {
                cell.onclick = () => {
                    if (!trackingData[loopKey]) trackingData[loopKey] = { completed: [] };
                    
                    if (trackingData[loopKey].status === "success") {
                        trackingData[loopKey].status = "fail";
                    } else if (trackingData[loopKey].status === "fail") {
                        delete trackingData[loopKey].status;
                        trackingData[loopKey].completed = [];
                    } else {
                        trackingData[loopKey].status = "success";
                        trackingData[loopKey].completed = [...dayProg.mandatory];
                    }

                    localStorage.setItem('prepa_tracking', JSON.stringify(trackingData));
                    if (loopKey === todayKey) {
                        window.location.reload();
                    } else {
                        buildCalendarGrid();
                    }
                };
            }

            gridTarget.appendChild(cell);
        }
    }
    buildCalendarGrid();

    function syncReminders() {
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.ready.then(reg => {
                if (reg.active) {
                    const todayState = trackingData[todayKey] || { completed: [] };
                    const isDone = todayState.status === "success";
                    reg.active.postMessage({
                        type: 'SYNC_REMINDERS',
                        isCompleted: isDone,
                        programText: todayProg.mandatory.join(' + ')
                    });
                }
            });
        }
    }

    document.getElementById('enable-notif').addEventListener('click', () => {
        Notification.requestPermission();
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                setTimeout(syncReminders, 300);
                alert("Système activé avec succès !");
            });
        }
    });

    navigator.serviceWorker.ready.then(() => { syncReminders(); });
</script>
</body>
</html>
